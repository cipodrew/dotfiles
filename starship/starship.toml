#permmeso solo in zsh
right_format = """\
$all\
"""

palette = "catppuccin_mocha"

[line_break]
disabled = true # oppure true per singola riga

[directory]
format = "[ ’ōö $path ]($style)"
style = "fg:#1E1E2E bg:#89b4fa"
truncate_to_repo = false
truncation_length = 5 #number of dir before truncate
truncation_symbol = 'ŌĆ”/'#The symbol to prefix to truncated paths

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "Ņ£ē ’Éś "
style = "fg:#1E1E2E bg:yellow"

[git_status]
format = '[$all_status]($style)'
style = "fg:#1E1E2E bg:yellow"
#conflicted = "’üŚ "
#ahead = "’Ćø "
#behind = "’ĆÜ "
#diverged = "¾░åŚ "
#up_to_date = "’üś "
#untracked = "’üÖ "
#stashed = "’Ć£ "
#modified = "’ü¬ "
#staged = "’üĢ "
#renamed = "’üÜ "
#deleted = "’ü¢ "

[git_metrics]
format = "([+$added]($added_style))[]($added_style)"
added_style = "fg:#1E1E2E bg:yellow"
deleted_style = "fg:bright-red bg:235"
disabled = false

[hg_branch]
format = "[ $symbol$branch ]($style)"
symbol = "’Éś "

[cmd_duration]
format = "[ ’ÖÅ $duration ]($style)"
style = "fg:bright-white bg:18"
disabled = true

[character]
#success_symbol = '[ Ō×£](bold green) '
error_symbol = '[ Ō£Ś](#E84D44) '

[time]
disabled = true
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ¾▒æŹ $time ](bg:#1C3A5E fg:#8DFBD2)]($style)'

[hostname]
ssh_only = false
style = "(bg:#surface0 fg:text)"
format = '[$ssh_symbol](bold sapphire)[[@$hostname](bg:#24273a fg:text)]($style)'
#format = '[$ssh_symbol](bold blue)@[$hostname](bold sapphire):'
disabled = false

[username]
#style_user = 'green bold'
style_user = 'bold blue'
style_root = 'black bold'
format = '[[$user](bg:#24273a fg:text)]($style)'
disabled = false
show_always = true

[golang]
format = '[Ņś¦ $version](bold cyan) '



