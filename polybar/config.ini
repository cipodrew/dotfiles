include-file = $HOME/.config/polybar/catppuccin-mocha.ini
include-file = $HOME/.config/polybar/snowfall.ini
[colors]
background = ${colors.base}
background-alt = ${colors.surface0}
foreground = ${colors.text}
primary = ${colors.peach}
secondary = ${colors.maroon}
alert = ${colors.red}
disabled = ${colors.subtext0}
urgent = ${colors.red}
urgent2 = ${colors.peach}
warning = ${colors.yellow}
success = ${colors.sapphire}
black = ${colors.crust}
accent1 = ${colors.sapphire}
accent2 = ${colors.green}
accent3 = ${colors.pink}
accent4 = ${colors.rosewater}
accent5 = ${colors.yellow}
tenue = ${colors.lavender}

include-file = $HOME/.config/polybar/secondarybar.ini
include-file = $HOME/.config/polybar/standingbar.ini
include-file = $HOME/.config/polybar/arrows.ini
; Potrebbe essere una buona idea fare almeno un modulo invertito, con sfondo scuro e scritte bianche
;arrows and many theme from TheLinuxCast on youtube
[bar/main]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
;border-size = 4pt
border-color = #00000000
; border-bottom-size = 0
 

padding-left = 0
padding-right = 2 

;module-margin = 1
module-margin = 0 ;richiede empty space

;separator = |
separator = ""
separator-foreground = ${colors.disabled}

;font-0 = monospace;2
;font-0 = "FiraCode Nerd Font Mono:12;2"
font-0 = "JetBrains Mono Nerd Font:10;2"
font-1 = "Hack Nerd Font Mono:10;2"
font-2 = "JetBrainsMono Nerd Font:size=10;2"
font-3 = "JetBrainsMono Nerd Font:size=22;5"

modules-left = xworkspaces empty-space xwindow empty-space rofi-launcher
modules-center = round-left date round-right
;modules-center = round-left date round-right
modules-right = arrow0 filesystem arrow1 pulseaudio arrow2 xkeyboard arrow3 memory arrow4 cpu  arrow5 battery-icon battery empty-space powermenu
;empty-space battery

; for poybar version > 3.7.0 modules-right = filesystem pulseaudio xkeyboard memory cpu date powermenu tray 

cursor-click = pointer
cursor-scroll = ns-resize

;click-left = rofi -show drun
;click-right = rofi -show run

enable-ipc = true
;deprecated in 3.7
tray-position = right

; wm-restack = generic
; wm-restack = bspwm
  wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
; label = %title:0:60:...%
label = %title:0:60:...%
label-maxlen = 20

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

;label-mounted = %{F#a6e3a1}%mountpoint%%{F-} %percentage_used%%
;label-foreground = ${colors.accent2}
;label-mounted-overline = ${colors.accent2}

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

;label-mounted = %{F#585b70}%mountpoint%%{F-} %{F#192E43}%percentage_used%%%{F-}
label-mounted = %{F#585b70}Ôďď %{F-} %{F#192E43}%percentage_used%%%{F-}
;ÔďĒ
label-foreground = ${colors.snow-dark}
label-mounted-background = ${colors.snow-white2}
format-background = ${colors.snow-white2}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄ®  "
format-volume-prefix-foreground = ${colors.surface0}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

label-volume-foreground = ${colors.snow-dark}
label-volume-background =  ${colors.snow-foreground}
format-volume-prefix-background= ${colors.snow-foreground}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock


format-prefix = "ÔĄú  "
format-prefix-foreground = ${colors.crust}
#format-layout-prefix = "ÔĄú  "
label-layout = %layout%
;label-layout-foreground = ${colors.text}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

label-layout-foreground = ${colors.snow-dark}
format-background =  ${colors.snow-white3}

[module/memory]
type = internal/memory
interval = 2
#format-prefix = "RAM "ÓĮ§ÔąÄ
format-prefix = "ÔąÄ "
format-prefix-foreground = ${colors.overlay1}
label = %percentage_used:2%%

label-foreground = ${colors.snow-dark}
format-background =  ${colors.snow-offwhite}


[module/cpu]
type = internal/cpu
interval = 2
#format-prefix = "CPU "Ôíľ
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.overlay0}
label = %percentage:2%%

label-foreground = ${colors.snow-dark}
format-background =  ${colors.snow-white2}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %H:%M ůįÉ≠ %a,%d%b

format-prefix = "Ôźļ "
format-prefix-foreground = ${colors.pink}
label = %date%
label-foreground = ${colors.text}
format-background = #2a2e36

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-open = "ÔÄĎ"
label-open-foreground = ${colors.urgent}
label-close = ÔĄÖ cancel
label-close-foreground = ${colors.success}
label-separator = |
label-separator-foreground = ${colors.foreground}

;Powermenu
menu-0-0 = "Reboot "
menu-0-0-exec = menu-open-1
menu-0-0-foreground = ${colors.urgent2}

menu-0-1 = "Power Off"
menu-0-1-exec = menu-open-2
menu-0-1-foreground = ${colors.urgent}

menu-0-2 = "Suspend"
menu-0-2-exec = menu-open-3
menu-0-2-foreground = ${colors.warning}

;menu-0-2 = "Hibernate"
;menu-0-2-exec = menu-open-3
;menu-0-2-foreground = ${colors.warning}

;Reboot
menu-1-0 = "Cancel "
menu-1-0-exec = menu-open-0
menu-1-0-foreground = ${colors.success}
menu-1-1 = "Reboot"
menu-1-1-exec = systemctl reboot
menu-1-1-foreground = ${colors.urgent2}

;Shutdown
menu-2-0 = "Power off"
menu-2-0-exec = systemctl poweroff
menu-2-0-foreground = ${colors.urgent}
menu-2-1 = "Cancel "
menu-2-1-exec = menu-open-0
menu-2-1-foreground = ${colors.success}

;Suspend
menu-3-0 = "Suspend"
menu-3-0-exec = systemctl suspend
menu-3-0-foreground = ${colors.urgent}
menu-3-1 = "Cancel"
menu-3-1-exec = menu-open-0
menu-3-1-foreground = ${colors.success}

;Hibernate
;menu-3-0 = "Hibernate "
;menu-3-0-exec = systemctl hibernate
;menu-3-0-foreground = ${colors.urgent}
;menu-3-1 = "Cancel"
;menu-3-1-exec = menu-open-0
;menu-3-1-foreground = ${colors.success}
;
[module/rofi-launcher]
type = custom/text
content = ůĪďě
#content-background = ${colors.rosewater}
content-foreground = ${colors.secondary}

click-left = rofi -show drun &
click-right = rofi -show run &

[module/battery-icon]
type = custom/text
format= "ÔČĀ "
format-prefix-foreground = ${colors.overlay0}

format-foreground = ${colors.snow-white2}
; format-foreground = ${colors.snow-dark}
; format-background =  ${colors.snow-white2}

content-font = 4 
content-padding = 0
format-margin = 1

[module/battery]
type = internal/battery

battery = BAT1
adatper = ACAD
poll-interval = 60

[module/tray]
type = internal/tray

format-margin = 8px
tray-spacing = 8px

[module/empty-space]
type = custom/text
content = "  "

[module/round-left]
type = custom/text
content = "Óā∂"
content-foreground = #2a2e36
content-font = 4 
content-padding = 0

[module/round-right]
type = custom/text
content = "Óāī"
content-foreground = #2a2e36
content-font = 4 
content-padding = 0

; vim:ft=dosini
;
;

